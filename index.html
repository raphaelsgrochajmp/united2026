<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; margin: 0; display: flex; justify-content: center; overflow: hidden; }
        .scoreaxis-widget { width: 600px; }
    </style>
</head>
<body>

    <div id="wg-united" class="scoreaxis-widget"></div>

    <script>
        const stages = [
            "67047c992662621d770ac1b8", "67047c99af56e6175101d376", "67047c99c81c4876d00099a2",
            "67047c992662621d770ac1ba", "67047c99af56e6175101d378", "67047c992662621d770ac1bc",
            "67047c991c3e9feeb3052444", "67047c992662621d770ac1be", "67047c99af56e6175101d37a",
            "67047c99c81c4876d00099a4", "67047c992662621d770ac1c0", "67047c99af56e6175101d37c"
        ];

        const urlParams = new URLSearchParams(window.location.search);
        let idx = parseInt(urlParams.get('g')) || 0;
        let nextIdx = (idx + 1) % stages.length;

        // 1. Criamos o script do ScoreAxis exatamente como eles pedem
        const s = document.createElement('script');
        s.src = "https://widgets.scoreaxis.com/api/football/league-table/62322bfa75414360044d5ca4?widgetId=wg-united&stageId=" + stages[idx] + "&bodyColor=%23000000&textColor=%23ffffff&borderColor=%23ecf1f7&font=roboto";
        s.async = true;
        document.body.appendChild(s);

        // 2. Em vez de trocar o widget, RECARREGAMOS a página para o próximo grupo em 20 segundos
        // Isso evita o erro de "wrapper not found"
        setTimeout(() => {
            window.location.href = window.location.origin + window.location.pathname + "?g=" + nextIdx;
        }, 20000);
    </script>
</body>
</html>
