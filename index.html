<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #wg-target { width: 600px; min-height: 600px; }
    </style>
</head>
<body>
    <div id="wg-target"></div>

    <script>
        const stages = [
            "67047c992662621d770ac1b8", "67047c99af56e6175101d376", "67047c99c81c4876d00099a2",
            "67047c992662621d770ac1ba", "67047c99af56e6175101d378", "67047c992662621d770ac1bc",
            "67047c991c3e9feeb3052444", "67047c992662621d770ac1be", "67047c99af56e6175101d37a",
            "67047c99c81c4876d00099a4", "67047c992662621d770ac1c0", "67047c99af56e6175101d37c"
        ];
        let i = 0;

        function load() {
            const target = document.getElementById('wg-target');
            const stage = stages[i];
            const widgetId = "wg" + Math.floor(Math.random() * 1000000);
            
            // 1. Limpamos e criamos o wrapper primeiro
            target.innerHTML = `<div id="${widgetId}" class="scoreaxis-widget"></div>`;
            
            // 2. Pequeno atraso de 100ms para garantir que o wrapper existe no DOM
            setTimeout(() => {
                const s = document.createElement('script');
                s.src = `https://widgets.scoreaxis.com/api/football/league-table/62322bfa75414360044d5ca4?widgetId=${widgetId}&lang=en&stageId=${stage}&teamLogo=1&tableLines=1&header=1&position=1&goals=1&gamesCount=1&diff=1&winCount=1&drawCount=1&loseCount=1&points=1&font=roboto&fontSize=18&widgetWidth=600&bodyColor=%23000000&textColor=%23ffffff&borderColor=%23ecf1f7`;
                s.async = true;
                target.appendChild(s);
            }, 100);

            i = (i + 1) % stages.length;
        }

        // Só inicia quando a janela estiver totalmente carregada
        window.onload = () => {
            load();
            setInterval(load, 15000);
        };
    </script>
</body>
</html>
