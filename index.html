<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; background: transparent; overflow: hidden; font-family: 'Roboto', sans-serif; }
        #wrapper { width: 600px; height: auto; }
        .widget-main-link { display: none !important; }
    </style>
</head>
<body>
    <div id="wrapper">
        <div id="widget-container"></div>
    </div>
    <script>
        const stages = [
            "67047c992662621d770ac1b8", // A
            "67047c99af56e6175101d376", // B
            "67047c99c81c4876d00099a2", // C
            "67047c992662621d770ac1ba", // D
            "67047c99af56e6175101d378", // E
            "67047c992662621d770ac1bc", // F
            "67047c991c3e9feeb3052444", // G
            "67047c992662621d770ac1be", // H
            "67047c99af56e6175101d37a", // I
            "67047c99c81c4876d00099a4", // J
            "67047c992662621d770ac1c0", // K
            "67047c99af56e6175101d37c"  // L
        ];
        let i = 0;
        function loadScoreAxis() {
            const container = document.getElementById('widget-container');
            const currentStage = stages[i];
            const uniqueId = "wg" + Math.floor(Math.random() * 1000000);
            container.innerHTML = ''; 
            const div = document.createElement('div');
            div.id = uniqueId;
            div.className = "scoreaxis-widget";
            div.style.cssText = "width: 600px; height: auto; font-size: 18px; background-color: #000000; color: #ffffff; border: 1px solid #ecf1f7;";
            const script = document.createElement('script');
            script.src = `https://widgets.scoreaxis.com/api/football/league-table/62322bfa75414360044d5ca4?widgetId=${uniqueId}&lang=en&stageId=${currentStage}&teamLogo=1&tableLines=1&homeAway=0&header=1&position=1&goals=1&gamesCount=1&diff=1&winCount=1&drawCount=1&loseCount=1&lastGames=0&points=1&teamsLimit=all&links=0&font=roboto&fontSize=18&rowDensity=100&widgetWidth=600&widgetHeight=auto&bodyColor=%23000000&textColor=%23ffffff&linkColor=%23ffffff&borderColor=%23ecf1f7&tabColor=%23f3f8fd`;
            script.async = true;
            container.appendChild(div);
            container.appendChild(script);
            i = (i + 1) % stages.length;
        }
        loadScoreAxis();
        setInterval(loadScoreAxis, 15000);
    </script>
</body>
</html>
