<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; }
        /* Forçamos a altura para o script "sentir" que a div existe */
        #wg-scope { width: 600px; height: 600px; display: block !important; visibility: visible !important; }
    </style>
</head>
<body>

    <div id="wg-scope" class="scoreaxis-widget"></div>

    <script>
        const stages = [
            "67047c992662621d770ac1b8", "67047c99af56e6175101d376", "67047c99c81c4876d00099a2",
            "67047c992662621d770ac1ba", "67047c99af56e6175101d378", "67047c992662621d770ac1bc",
            "67047c991c3e9feeb3052444", "67047c992662621d770ac1be", "67047c99af56e6175101d37a",
            "67047c99c81c4876d00099a4", "67047c992662621d770ac1c0", "67047c99af56e6175101d37c"
        ];
        
        let i = 0;

        function loadTable() {
            const container = document.getElementById('wg-scope');
            if (!container) return;

            container.innerHTML = '';
            const stage = stages[i];
            
            const s = document.createElement('script');
            // Mudamos o widgetId para garantir que ele bata com o ID da DIV acima
            s.src = `https://widgets.scoreaxis.com/api/football/league-table/62322bfa75414360044d5ca4?widgetId=wg-scope&lang=en&stageId=${stage}&teamLogo=1&tableLines=1&header=1&points=1&widgetWidth=600&bodyColor=%23000000&textColor=%23ffffff&t=${Date.now()}`;
            s.async = false; // Forçamos o carregamento síncrono para ele não atropelar
            
            container.appendChild(s);
            i = (i + 1) % stages.length;
        }

        // AGORA O PULO DO GATO:
        // Em vez de window.onload, usamos um pequeno atraso fixo de 2 segundos.
        // Isso dá tempo pro M4 desenhar tudo e pro Chrome estabilizar.
        setTimeout(function() {
            loadTable();
            setInterval(loadTable, 15000);
        }, 2000);
    </script>
</body>
</html>
