<body>
    <iframe id="quadro" src=""></iframe>

    <script>

        ];

        let i = 0;
        const el = document.getElementById('quadro');

        function trocar() {
            el.src = tabelas[i];
            i = (i + 1) % tabelas.length;
        }

        // Começa agora
        trocar();
        // Troca a cada 20 segundos para dar tempo de ler
        setInterval(trocar, 20000);
    </script>
